<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles/popup.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0">
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <img src="icons/icon.png" class="logo">
      <h2>NotebookLM Enhancer</h2>
      <div class="header-toggle">
        <label class="switch">
          <input type="checkbox" id="enabled-toggle" checked>
          <span class="slider round"></span>
        </label>
      </div>
    </div>

    <div id="sliderev-intro" class="section sliderev-promo">
      <div class="promo-header">
        <span class="material-symbols-outlined promo-icon">rocket_launch</span>
        <div class="promo-title">Available Now: SlideRev</div>
      </div>
      <p class="promo-desc">
        The professional macOS companion for NotebookLM. 
        <b>High-fidelity, editable PPTX & PDF exports</b>.
      </p>
      <div class="promo-actions">
        <span class="status-badge status-licensed">Available on App Store</span>
        <a href="https://apps.apple.com/us/app/slide-rev/id6761469500" target="_blank" class="download-btn">
          <span class="material-symbols-outlined">download</span>
          Get App
        </a>
      </div>
    </div>

    <div class="footer">
      <div class="footer-row">
        <button id="share-btn" class="share-btn">
          <span class="material-symbols-outlined">share</span>
          Share
        </button>
        <div class="version">v1.7.5 (Free)</div>
      </div>
    </div>
  </div>
  <script src="scripts/storage.js"></script>
  <script src="scripts/popup.js"></script>
</body>
</html>
